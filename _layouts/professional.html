---
layout: default
---
<h1>{{ page.title }}</h1>

<div>
    {% assign sorted_cats = site.bio_categories | sort: "order" %}
    {% for cat in sorted_cats %}
    <h2 class="categoryTitle" id="categoryTitle_{{ cat.order }}">{{ cat.title }}</h2>
    <div class="categoryDetail" id="category_{{ cat.order }}">
        {{ cat.content | markdownify }}
    </div>
    {% endfor %}
</div>

<script src="http://code.jquery.com/jquery-3.4.1.min.js"></script>
<script>
    $(function() {
        $(".categoryDetail").hide();
        $("#category_1").show();
    });

    $(".categoryTitle").click(function(e) {
        $(".categoryDetail").hide();
        let id = $(this).attr('id');
        let suffix = id.substr(13);
        $("#category" + suffix).show();
    });
</script>
